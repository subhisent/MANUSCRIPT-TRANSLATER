<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChronicleAI - Historical OCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#0f766e',
                50: '#f0fdfa',
                100: '#ccfbf1',
                200: '#99f6e4',
                600: '#0d9488',
                700: '#0f766e',
                800: '#115e59',
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --primary: #0f766e;
        --primary-10: rgba(15, 118, 110, 0.10);
        --primary-20: rgba(15, 118, 110, 0.20);
        --primary-05: rgba(15, 118, 110, 0.05);
        --bg: #f1f5f9;
        --text-default: #0f172a;
        --text-muted: #334155;
        --text-on-primary: #ffffff;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text-default);
        margin: 0;
        overflow-x: hidden;
      }
      .heritage-bg {
        background-image: linear-gradient(rgba(241, 245, 249, 0.96), rgba(248, 250, 252, 0.98)), url('https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?q=80&w=2073&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }
      .glass {
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(20px) saturate(140%);
        border: 1px solid rgba(15, 118, 110, 0.12);
        box-shadow: 0 8px 32px 0 rgba(15, 23, 42, 0.06);
      }
      .bg-primary { background-color: var(--primary); }
      .bg-primary-10 { background-color: var(--primary-10); }
      .bg-primary-05 { background-color: var(--primary-05); }
      .bg-primary-20 { background-color: var(--primary-20); }
      .text-primary { color: var(--primary); }
      .text-on-primary { color: var(--text-on-primary); }
      .text-on-light { color: var(--text-default); }
      .border-primary { border-color: var(--primary); }
      .border-primary-10 { border-color: var(--primary-10); }
      .border-primary-20 { border-color: var(--primary-20); }
      .primary-glow { filter: drop-shadow(0 0 10px rgba(15, 118, 110, 0.28)); }
      .card-3d {
        transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.5s ease;
        transform-style: preserve-3d;
        perspective: 1000px;
      }
      .card-3d:hover {
        transform: translateY(-8px) rotateX(4deg) rotateY(2deg);
        box-shadow: 0 28px 56px -16px rgba(15, 118, 110, 0.18);
      }
      .green-glow {
        filter: drop-shadow(0 0 12px rgba(15, 118, 110, 0.35));
      }
      @keyframes float {
        0% { transform: translateZ(20px) translateY(0px); }
        50% { transform: translateZ(50px) translateY(-20px); }
        100% { transform: translateZ(20px) translateY(0px); }
      }
      .animate-float-deep {
        animation: float 8s ease-in-out infinite;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.06);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #0f766e;
        border-radius: 10px;
      }
      @keyframes stabilizer-pulse {
        0% { border-color: rgba(15, 118, 110, 0.2); transform: scale(0.98); }
        50% { border-color: rgba(15, 118, 110, 0.8); transform: scale(1.02); }
        100% { border-color: rgba(15, 118, 110, 0.2); transform: scale(0.98); }
      }
      .stabilizer-ring {
        animation: stabilizer-pulse 2s infinite ease-in-out;
      }
      @media (max-width: 768px) {
        .heritage-bg {
          background-attachment: scroll;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
